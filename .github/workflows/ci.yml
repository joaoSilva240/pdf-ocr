name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ────────────────────────────────────────────────────────────────
  # Lint — verifica qualidade do código com ruff
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff
        run: uv run ruff check src/ main.py

  # ────────────────────────────────────────────────────────────────
  # Test — instala Tesseract e valida o pipeline
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tesseract OCR
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-por tesseract-ocr-eng

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check dependencies (Tesseract)
        run: uv run python main.py --check-deps

      - name: Verify CLI help
        run: uv run python main.py --help

  # ────────────────────────────────────────────────────────────────
  # Docker — build da imagem e smoke test
  # ────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pdf-ocr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (check-deps)
        run: docker run --rm pdf-ocr:ci --check-deps

      - name: Smoke test (help)
        run: docker run --rm pdf-ocr:ci --help
